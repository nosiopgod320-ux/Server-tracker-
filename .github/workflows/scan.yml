name: Blox Fruits Server Scanner

on:
  schedule:
    - cron: "0 */5 * * *"   # Restart every 5 hours as safety net
  workflow_dispatch:

concurrency:
  group: scanner
  cancel-in-progress: false  # Queue next run, never cancel the active one

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Write scanner
        run: |
          mkdir -p data
          cat > /tmp/scan.mjs << 'EOF'
          import { readFileSync, writeFileSync, existsSync, mkdirSync } from "fs";
          const DATA = "data";
          const STATE = DATA + "/state.json";
          const OUT   = DATA + "/servers.json";
          const PID   = 2753915549;
          const TOP   = 10;
          const EVENTS = {
            PirateRaid:  { offset: 4500, interval: 3600 },
            FactoryRaid: { offset: 900,  interval: 7200 },
            FruitSpawn:  { offset: 0, interval: () => ([0,6].includes(new Date().getUTCDay()) ? 2700 : 3600) },
          };
          mkdirSync(DATA, { recursive: true });
          let state = existsSync(STATE) ? JSON.parse(readFileSync(STATE,"utf8")) : { isFirstScan:true, servers:{}, lastScanAt:null };
          const isFirst = state.isFirstScan;
          state.isFirstScan = false;
          console.log(isFirst ? "First scan — baseline" : "Scanning (" + Object.keys(state.servers).length + " known)");
          async function pg(cur, n) {
            let u = "https://games.roblox.com/v1/games/"+PID+"/servers/Public?limit=100";
            if (cur) u += "&cursor=" + encodeURIComponent(cur);
            const r = await fetch(u, { headers:{"User-Agent":"Mozilla/5.0","Accept":"application/json","Referer":"https://www.roblox.com/"}, signal:AbortSignal.timeout(15000) });
            if (r.status===429) { console.log("Rate limited p"+n); return {servers:[],nextCursor:null,stop:true}; }
            if (!r.ok) throw new Error("API "+r.status);
            const d = await r.json();
            return { servers:d.data??[], nextCursor:d.nextPageCursor??null, stop:false };
          }
          let live=[],cur=null;
          for (let p=0;p<3;p++) {
            const {servers,nextCursor,stop} = await pg(cur, p+1);
            live.push(...servers);
            if (stop||!nextCursor) break;
            await new Promise(r=>setTimeout(r,3000));
            cur=nextCursor;
          }
          console.log("Got:", live.length);
          const now=Date.now()/1000, seen=new Set(); let added=0;
          for (const s of live) {
            seen.add(s.id);
            if (state.servers[s.id]) { state.servers[s.id].playing=s.playing; state.servers[s.id].fps=s.fps; }
            else if (isFirst) state.servers[s.id]={firstSeen:null,status:"unknown",playing:s.playing,fps:s.fps};
            else { state.servers[s.id]={firstSeen:now,status:"tracked",playing:s.playing,fps:s.fps}; added++; }
          }
          if (live.length>=250) for (const id of Object.keys(state.servers)) if (!seen.has(id)) delete state.servers[id];
          state.lastScanAt=new Date().toISOString();
          const tracked=Object.values(state.servers).filter(e=>e.status==="tracked").length;
          console.log("+"+added+" new | tracked:"+tracked);
          const events={};
          for (const [name,cfg] of Object.entries(EVENTS)) {
            const iv=typeof cfg.interval==="function"?cfg.interval():cfg.interval, off=cfg.offset, list=[];
            for (const [id,e] of Object.entries(state.servers)) {
              if (e.status!=="tracked"||!e.firstSeen||(e.fps??60)<20) continue;
              const age=now-e.firstSeen, t=age<off?Math.round(off-age):Math.round(iv-((age-off)%iv));
              list.push({jobId:id,timeUntilEvent:t,estimatedAge:Math.round(age),playing:e.playing??0,fps:Math.round((e.fps??60)*10)/10});
            }
            list.sort((a,b)=>a.timeUntilEvent-b.timeUntilEvent);
            events[name]=list.slice(0,TOP);
          }
          writeFileSync(STATE,JSON.stringify(state,null,2));
          writeFileSync(OUT,JSON.stringify({updatedAt:state.lastScanAt,totalKnown:Object.keys(state.servers).length,totalTracked:tracked,newThisScan:added,events},null,2));
          console.log("Saved.");
          const wh=process.env.DISCORD_WEBHOOK;
          if (wh&&!isFirst&&added>0) {
            const lines=["**Blox Fruits** | Tracked: **"+tracked+"** | +"+added+" new"];
            for (const [name,svs] of Object.entries(events)) {
              const soon=svs.filter(s=>s.timeUntilEvent<600); if (!soon.length) continue;
              const lbl={PirateRaid:"⚔️ Pirate/Castle Raid",FactoryRaid:"🏭 Factory Raid",FruitSpawn:"🍎 Fruit Spawn"}[name]??name;
              lines.push(lbl+":"); for (const s of soon.slice(0,3)) lines.push("`"+s.jobId+"` — **"+Math.floor(s.timeUntilEvent/60)+"m "+(s.timeUntilEvent%60)+"s**");
            }
            await fetch(wh,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content:lines.join("\n").slice(0,2000)})});
          }
          EOF

      - name: Scan loop — every 171 seconds
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Loop for ~340 minutes (job timeout is 350)
          END=$((SECONDS + 20400))
          while [ $SECONDS -lt $END ]; do
            git pull --quiet origin main 2>/dev/null || true
            node /tmp/scan.mjs
            git add data/
            git diff --staged --quiet || (git commit -m "scan $(date -u '+%H:%M:%S')" && git push --quiet)
            sleep 171
          done
