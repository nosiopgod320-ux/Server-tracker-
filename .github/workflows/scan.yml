name: Blox Fruits Server Scanner

on:
  schedule:
    # Trigger a fresh Actions run every 5 hours so the job stays alive
    - cron: "0 */5 * * *"
  workflow_dispatch:

concurrency:
  group: scanner
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    # Run for up to 5 hours 40 minutes (GitHub free limit is 6 hours)
    timeout-minutes: 340

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Scan loop (every 171 seconds)
        env:
          DISCORD_WEBHOOK_PIRATE_RAID:    ${{ secrets.DISCORD_WEBHOOK_PIRATE_RAID }}
          DISCORD_WEBHOOK_FACTORY_RAID:   ${{ secrets.DISCORD_WEBHOOK_FACTORY_RAID }}
          DISCORD_WEBHOOK_FRUIT_SPAWN:    ${{ secrets.DISCORD_WEBHOOK_FRUIT_SPAWN }}
          DISCORD_WEBHOOK_LEGENDARY_SWORD: ${{ secrets.DISCORD_WEBHOOK_LEGENDARY_SWORD }}
          DISCORD_WEBHOOK_FIST_DARKNESS:  ${{ secrets.DISCORD_WEBHOOK_FIST_DARKNESS }}
          DISCORD_WEBHOOK_GOD_CHALICE:    ${{ secrets.DISCORD_WEBHOOK_GOD_CHALICE }}
        run: |
          # Loop for 5.5 hours (19800 seconds), scanning every 171 seconds
          END=$((SECONDS + 19800))
          while [ $SECONDS -lt $END ]; do
            echo "--- Scan at $(date -u '+%H:%M:%S UTC') ---"

            # Pull latest data so commits don't conflict
            git pull --quiet --rebase origin main 2>/dev/null || true

            # Run the scanner
            node scripts/scan.mjs

            # Commit and push if data changed
            git add data/state.json data/servers.json
            git diff --staged --quiet || (
              git commit -m "scan $(date -u '+%H:%M:%S')"
              git push --quiet
            )

            echo "Next scan in 171 seconds…"
            sleep 171
          done
          echo "Loop complete — next scheduled run will take over."
